<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grand City Highway</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="game">

<div id="hud">
<span>Score: <span id="score">0</span></span>
<span>❤️ <span id="lives">3</span></span>
</div>

<div id="road">

<div id="car"></div>

<div id="coin"></div>

<div id="obstacle"></div>

<div class="tree left" style="top:60px;"></div>
<div class="tree right" style="top:180px;"></div>
<div class="tree left" style="top:320px;"></div>
<div class="tree right" style="top:430px;"></div>

</div>

<div class="controls">
<button id="leftBtn">⬅</button>
<button id="upBtn">⬆</button>
<button id="rightBtn">➡</button>
</div>

<button id="restartBtn">🔄 Restart Game</button>

</div>

<script src="script.js"></script>

</body>
</html>
