<!DOCTYPE html>
<html>
<head>
    <title>Callisto Highway</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🚗 Callisto Highway</h1>

<div id="road">
    <div id="car">🚗</div>
</div>

<p>Score: <span id="score">0</span></p>

<button id="startBtn" onclick="startGame()">▶ Start Game</button>

<button id="moveBtn" onclick="moveForward()" disabled>
➡ Move Forward
</button>

<button onclick="restartGame()">🔄 Restart</button>

<h2 id="gameOver" style="display:none;color:red;">
GAME OVER
</h2>

<script src="script.js"></script>

</body>
</html>
